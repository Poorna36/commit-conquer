name: Evaluate PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install global tools
        continue-on-error: true
        run: npm install -g ts-node typescript

      - name: Install test dependencies
        continue-on-error: true
        run: npm install --prefix tests --legacy-peer-deps

      - name: Create results directory
        run: mkdir -p eval_results

      - name: Run tests
        continue-on-error: true
        run: |
          set +e
          cd tests && npm test > ../eval_results/test_output.log 2>&1
          EXIT=$?
          PASSED=$([ "$EXIT" -eq 0 ] && echo true || echo false)
          printf '{"tests_passed":%s,"command":"npm test","exit_code":%s}\n' "$PASSED" "$EXIT" \
            > ../eval_results/test_result.json
          exit 0

      - name: Run lint
        continue-on-error: true
        run: bash eval/run_lint.sh

      - name: Start backend
        continue-on-error: true
        run: |
          PORT=4000 CORS_ORIGIN=http://localhost:3000 \
          ADMIN_SECRET=admin_dev_secret NODE_ENV=test \
          npm run start:server &
          sleep 10

      - name: Build frontend
        continue-on-error: true
        run: cd apps/storefront && npm run build

      - name: Start frontend preview
        continue-on-error: true
        run: |
          cd apps/storefront && npx vite preview --port 3000 --host &
          sleep 15

      - name: Install k6
        continue-on-error: true
        uses: grafana/setup-k6-action@v1

      - name: Run load test
        continue-on-error: true
        run: bash eval/run_load_test.sh

      - name: Install Lighthouse CI
        continue-on-error: true
        run: npm install -g @lhci/cli

      - name: Run Lighthouse
        continue-on-error: true
        run: bash eval/run_lighthouse.sh

      - name: Run bundle check
        continue-on-error: true
        run: bash eval/run_bundle_check.sh

      - name: Compute score
        continue-on-error: true
        run: node eval/compute_score.js

      - name: Post score + AI review
        env:
          GITHUB_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          REPO:            ${{ github.repository }}
          PR_NUMBER:       ${{ github.event.pull_request.number }}
          GITHUB_USERNAME: ${{ github.event.pull_request.user.login }}
          PR_TITLE:        ${{ github.event.pull_request.title }}
          PR_BODY:         ${{ github.event.pull_request.body }}
          PR_CREATED_AT:   ${{ github.event.pull_request.created_at }}
          BACKEND_URL:     ${{ secrets.BACKEND_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node eval/post_comment.js
